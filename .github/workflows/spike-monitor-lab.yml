name: "SPIKE: Monitor Lab (manual only)"

# Manual dispatch + a push trigger SCOPED TO THIS SPIKE BRANCH ONLY. It never
# runs on main or on pull_request, so it never becomes / touches a required
# check. (A pure workflow_dispatch workflow is not dispatchable until its file
# lands on the default branch — the branch-scoped push trigger is how this
# never-merged spike branch gets exercised in CI without going near main.)
# It installs a kernel-adjacent virtual-display driver on a throwaway hosted
# runner to answer feasibility Q1-Q5; the runner is discarded at job end.
on:
  workflow_dispatch:
    inputs:
      display_count:
        description: "Number of virtual displays to add"
        required: false
        default: "2"
  push:
    branches:
      - "spike/monitor-lab"

permissions:
  contents: read

jobs:
  monitor-lab:
    name: "Monitor Lab probe (windows-latest)"
    timeout-minutes: 20
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      # multideck import is needed so the probe can dump list_monitors().
      - name: Install multideck (for its own monitor enumeration)
        run: pip install -e .

      - name: "Runner context (session / admin / OS)"
        continue-on-error: true
        run: |
          Write-Host "=== RUNNER CONTEXT ==="
          Write-Host "whoami: $(whoami)"
          $admin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltinRole]::Administrator)
          Write-Host "IsAdministrator: $admin"
          Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption) build $((Get-CimInstance Win32_OperatingSystem).BuildNumber)"
          Write-Host "SessionId: $((Get-Process -Id $PID).SessionId)"
          Write-Host "Test-signing / boot config:"
          bcdedit /enum "{current}" | Select-String -Pattern "testsigning|nointegritychecks" | ForEach-Object { $_.Line }

      - name: "Q0: Baseline topology (no virtual driver yet)"
        continue-on-error: true
        run: |
          Write-Host "=== Q0 BASELINE ==="
          python spike/monitor_lab_probe.py baseline

      # ------------------------------------------------------------------ Q1
      - name: "Q1: Install parsec-vdd driver (silent installer)"
        id: parsec_install
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "=== Q1 PARSEC-VDD INSTALL ==="
          # The portable zip ships the driver as a self-contained silent
          # installer (parsec-vdd-x.exe) + the WPF app; the driver files
          # (mm.inf/mm.cat/nefcon) are bundled INSIDE the installer, so we run
          # its NSIS `/S` silent mode rather than the loose-file nefcon path.
          $url = "https://github.com/nomi-san/parsec-vdd/releases/download/v0.45.1/ParsecVDisplay-v0.45-portable.zip"
          $zip = "$env:RUNNER_TEMP\parsec.zip"
          $dst = "$env:RUNNER_TEMP\parsec"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          Write-Host "--- extracted tree ---"
          Get-ChildItem -Recurse $dst | ForEach-Object { $_.FullName }

          $installer = (Get-ChildItem -Recurse $dst -Filter "parsec-vdd-*.exe" | Select-Object -First 1).FullName
          if (-not $installer) { throw "parsec-vdd installer not found in portable zip" }
          Write-Host "installer: $installer"
          Write-Host "--- installer signature ---"
          $sig = Get-AuthenticodeSignature $installer
          Write-Host ("status={0} signer={1}" -f $sig.Status, $sig.SignerCertificate.Subject)

          Write-Host "--- running silent install (/S) ---"
          $p = Start-Process -FilePath $installer -ArgumentList "/S" -PassThru -Wait
          Write-Host "installer exit: $($p.ExitCode)"
          Start-Sleep -Seconds 8

          Write-Host "--- pnputil /enum-drivers (parsec/mm.inf) ---"
          $drv = pnputil /enum-drivers
          $drv | Select-String -Context 1,6 -Pattern "Parsec|mm\.inf" | ForEach-Object { $_.ToString() }
          Write-Host "--- PnP entities named Parsec ---"
          Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Parsec*" -or $_.Name -like "*Virtual Display*" } |
            ForEach-Object { Write-Host ("PnP: {0} | status={1} | id={2}" -f $_.Name, $_.Status, $_.DeviceID) }
          Write-Host "--- driver store signature for the installed .cat ---"
          Get-ChildItem "C:\Windows\System32\DriverStore\FileRepository" -Recurse -Filter "mm.cat" -ErrorAction SilentlyContinue |
            Select-Object -First 1 | ForEach-Object {
              $s = Get-AuthenticodeSignature $_.FullName
              Write-Host ("cat={0} status={1} signer={2}" -f $_.FullName, $s.Status, $s.SignerCertificate.Subject)
            }
          Write-Host "=== Q1 RESULT: parsec silent install completed (installer exit + enum above) ==="

      # -------------------------------------------------------------- Q2-Q4
      - name: "Q2-Q4: Add displays, enumerate, set resolutions + DPI"
        continue-on-error: true
        run: |
          Write-Host "=== Q2-Q4 PARSEC BATTERY ==="
          python spike/monitor_lab_probe.py parsec-battery --count ${{ github.event.inputs.display_count || '2' }}

      # ------------------------------------------------------------------ Q5
      # Only meaningful if Q1-Q4 passed. Hold the virtual displays alive in a
      # background process, launch a real multideck --go, and check that a
      # window landed on a virtual monitor.
      - name: "Q5: Real multideck window on a virtual monitor (bonus)"
        continue-on-error: true
        run: |
          Write-Host "=== Q5 REAL LAUNCH ON VIRTUAL MONITOR ==="
          $probe = "spike\monitor_lab_probe.py"
          # background holder keeps 1 virtual display alive for 90s
          $hold = Start-Process -FilePath "python" -ArgumentList @($probe,"parsec-hold","--count","1","--seconds","90") -PassThru -NoNewWindow -RedirectStandardOutput "$env:RUNNER_TEMP\hold.log"
          Start-Sleep -Seconds 10
          Write-Host "--- holder log so far ---"
          if (Test-Path "$env:RUNNER_TEMP\hold.log") { Get-Content "$env:RUNNER_TEMP\hold.log" }
          Write-Host "--- topology while held ---"
          python $probe enumerate --tag q5-held
          if ($hold -and -not $hold.HasExited) { Stop-Process -Id $hold.Id -Force }
          Write-Host "=== Q5 RESULT: see topology above (multideck launch wiring deferred to a later iteration) ==="

      - name: "Cleanup: remove parsec driver (best effort)"
        if: always()
        continue-on-error: true
        run: |
          Write-Host "=== CLEANUP ==="
          $nefcon = (Get-ChildItem -Recurse "$env:RUNNER_TEMP\parsec" -Filter "nefconw.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if ($nefcon) {
            & $nefcon --remove-device-node --hardware-id "Root\Parsec\VDA" --class-guid "4D36E968-E325-11CE-BFC1-08002BE10318"
            Write-Host "remove exit: $LASTEXITCODE"
          }
          python spike/monitor_lab_probe.py enumerate --tag final
