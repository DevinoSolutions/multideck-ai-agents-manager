name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: "Secret Scan (gitleaks)"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      # Pinned CLI instead of gitleaks-action: the action hard-requires a
      # GITLEAKS_LICENSE for organization repos; the MIT-licensed CLI does not.
      - name: Run gitleaks (pinned CLI)
        run: |
          curl -sSfL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          # --log-opts "HEAD": scan only history reachable from this ref, not every
          # fetched sibling branch (fetch-depth:0 pulls them all) — one branch's leak
          # must never fail every other open PR's scan. -v surfaces WHAT leaked.
          ./gitleaks git -v --no-banner --redact --config .gitleaks.toml --log-opts "HEAD" .

  unit-tests:
    name: "Unit Tests (py${{ matrix.python }}, ${{ matrix.os }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: python -m compileall -q src
      - run: pytest tests/unit/ -v

  lint-typecheck-coverage:
    name: "Lint + Type Check + Coverage"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v5.4.2
        with:
          enable-cache: true
      - run: uv lock --check
      - run: uv sync --extra dev --extra sentry --frozen --python 3.13
      - run: uv run --python 3.13 python scripts/check.py

  platform-integration:
    name: "Platform Integration (${{ matrix.os }})"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Setup virtual displays
        uses: ./.github/actions/setup-virtual-displays
      - name: Install terminal emulators
        uses: ./.github/actions/install-terminals
      # alacritty drives the terminal-fallback tier's beyond-default emulator
      # matrix (test_real_terminal_fallbacks.py). libgl1/libegl1 (glvnd loaders)
      # plus the mesa GLX/EGL/DRI impls give it a software-GL context under
      # headless Xvfb (paired with LIBGL_ALWAYS_SOFTWARE=1 in the child env).
      # INSTALL-ONLY, no `apt-get update`: the sibling install-terminals step
      # (which the neighbouring real-render tests tolerate) also installs without
      # a refresh, and setup-virtual-displays' lists are still warm — a second
      # refresh's I/O churn immediately before pytest was slowing those tests'
      # tight (<=6s) window-materialization deadline. kitty is excluded (it
      # cannot obtain a GL context under hosted Xvfb, confirmed on CI).
      - name: Install fallback terminal emulators (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get install -y --no-install-recommends \
            alacritty libgl1 libegl1 libgl1-mesa-dri libglx-mesa0 libegl-mesa0
      - run: pytest tests/platform/ -v -m platform

  end-to-end:
    name: "End-to-End (${{ matrix.os }})"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Setup virtual displays
        uses: ./.github/actions/setup-virtual-displays
      # xterm hosts the Linux real-SSH remote-launch leg (test_ssh_real.py)
      - name: Install terminal emulators
        uses: ./.github/actions/install-terminals
      - name: Run e2e tests
        run: pytest tests/e2e/ -v -m "e2e and not needs_ssh"
      - name: Setup SSH server
        id: ssh_setup
        uses: ./.github/actions/setup-ssh-server
        continue-on-error: true
      - name: Run e2e tests (SSH)
        if: steps.ssh_setup.outcome == 'success'
        run: pytest tests/e2e/ -v -m "e2e and needs_ssh"
      - name: Warn on skipped SSH e2e tests
        if: steps.ssh_setup.outcome != 'success'
        run: echo "::warning title=SSH e2e skipped::setup-ssh-server failed; needs_ssh tests did not run"

  packaged-install:
    name: "Packaged Install (${{ matrix.os }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # pytest orchestrates the tier (build wheel -> pristine venv -> real entry
      # point); `build` is the wheel builder, installed separately as CI's old
      # smoke job did. No virtual displays here by design: the window-spawn test
      # skips on hosted runners; the wheel build, import sweep, virgin first-run
      # and socket-real serve tests run everywhere -- already more than the old
      # ubuntu-only --help/--version smoke.
      - run: pip install -e ".[dev]"
      - run: pip install build
      - run: pytest tests/dist/ -v -m dist
