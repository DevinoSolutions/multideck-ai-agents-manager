name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: "Secret Scan (gitleaks)"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      # Pinned CLI instead of gitleaks-action: the action hard-requires a
      # GITLEAKS_LICENSE for organization repos; the MIT-licensed CLI does not.
      - name: Run gitleaks (pinned CLI)
        run: |
          curl -sSfL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks git --no-banner --redact --config .gitleaks.toml .

  unit-tests:
    name: "Unit Tests (py${{ matrix.python }}, ${{ matrix.os }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: python -m compileall -q src
      - run: pytest tests/unit/ -v

  lint-typecheck-coverage:
    name: "Lint + Type Check + Coverage"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v5.4.2
        with:
          enable-cache: true
      - run: uv lock --check
      - run: uv sync --extra dev --extra sentry --frozen --python 3.13
      - run: uv run --python 3.13 python scripts/check.py

  platform-integration:
    name: "Platform Integration (${{ matrix.os }})"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Setup virtual displays
        uses: ./.github/actions/setup-virtual-displays
      - name: Install terminal emulators
        uses: ./.github/actions/install-terminals
      - run: pytest tests/platform/ -v -m platform

  end-to-end:
    name: "End-to-End (${{ matrix.os }})"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Setup virtual displays
        uses: ./.github/actions/setup-virtual-displays
      - name: Run e2e tests
        run: pytest tests/e2e/ -v -m "e2e and not needs_ssh"
      - name: Setup SSH server
        id: ssh_setup
        uses: ./.github/actions/setup-ssh-server
        continue-on-error: true
      - name: Run e2e tests (SSH)
        if: steps.ssh_setup.outcome == 'success'
        run: pytest tests/e2e/ -v -m "e2e and needs_ssh"
      - name: Warn on skipped SSH e2e tests
        if: steps.ssh_setup.outcome != 'success'
        run: echo "::warning title=SSH e2e skipped::setup-ssh-server failed; needs_ssh tests did not run"

  wheel-install-smoke:
    name: "Wheel Build + Install Smoke Test"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pip install dist/multideck-*.whl
      - run: multideck --help
      - run: multideck --version
