name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: "Secret Scan (gitleaks)"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      # Pinned CLI instead of gitleaks-action: the action hard-requires a
      # GITLEAKS_LICENSE for organization repos; the MIT-licensed CLI does not.
      - name: Run gitleaks (pinned CLI)
        run: |
          curl -sSfL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          # --log-opts "HEAD": scan only history reachable from this ref, not every
          # fetched sibling branch (fetch-depth:0 pulls them all) — one branch's leak
          # must never fail every other open PR's scan. -v surfaces WHAT leaked.
          ./gitleaks git -v --no-banner --redact --config .gitleaks.toml --log-opts "HEAD" .

  unit-tests:
    name: "Unit Tests (py${{ matrix.python }}, ${{ matrix.os }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: python -m compileall -q src
      - run: pytest tests/unit/ -v

  lint-typecheck-coverage:
    name: "Lint + Type Check + Coverage"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v5.4.2
        with:
          enable-cache: true
      - run: uv lock --check
      - run: uv sync --extra dev --frozen --python 3.13
      - run: uv run --python 3.13 python scripts/check.py

  platform-integration:
    name: "Platform Integration (${{ matrix.os }})"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Setup virtual displays
        uses: ./.github/actions/setup-virtual-displays
      - name: Install terminal emulators
        uses: ./.github/actions/install-terminals
      # MUST stay the first step that can spawn wt on this runner: the pin's
      # "cold" claim is guaranteed by ordering (fresh VM, no earlier wt), not
      # by the test itself. Runs alone, gated on MDTEST_WT_COLD=1 so the main
      # sweep below never re-runs it warm.
      - name: wt cold-broker pin (first-ever wt launch on this runner)
        if: runner.os == 'Windows'
        env:
          MDTEST_WT_COLD: "1"
        run: pytest tests/platform/test_wt_cold_start.py -v -m wt_cold
      # Pinned psmux so the real psmux tier (lifecycle + full attach chain)
      # actually runs instead of skipping on the binary check. Release zip
      # pinned by version + sha256 (gitleaks pattern) rather than choco: the
      # community feed 504s often enough to fail unrelated runs. Installed to
      # %LOCALAPPDATA%\psmux (the product's own find_psmux() fallback dir) and
      # added to PATH like a normal user install.
      - name: Install psmux (pinned)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/psmux/psmux/releases/download/v3.3.6/psmux-v3.3.6-windows-x64.zip"
          $sha = "a56a890ea0829567818b9a368f16dcbd39c087f27328573df17c10dd39618947"
          Invoke-WebRequest -Uri $url -OutFile psmux.zip
          $actual = (Get-FileHash psmux.zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $sha) { throw "psmux.zip sha256 mismatch: $actual" }
          $dest = Join-Path $env:LOCALAPPDATA "psmux"
          Expand-Archive psmux.zip -DestinationPath $dest -Force
          Add-Content $env:GITHUB_PATH $dest
          & (Join-Path $dest "psmux.exe") -V
      - run: pytest tests/platform/ -v -m platform
      # Real-input tier: global SendInput chord + machine clipboard. CI-only
      # by design (MDTEST_INTERACTION=1 is set nowhere else); a dev box run
      # would stomp the user's clipboard and fire global keystrokes.
      - name: Interaction fidelity (real Alt+V hotkey chain)
        if: runner.os == 'Windows'
        env:
          MDTEST_INTERACTION: "1"
        run: pytest tests/platform/test_real_hotkey.py -v -m interaction

  end-to-end:
    name: "End-to-End (${{ matrix.os }})"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Setup virtual displays
        uses: ./.github/actions/setup-virtual-displays
      # xterm hosts the Linux real-SSH remote-launch leg (test_ssh_real.py)
      - name: Install terminal emulators
        uses: ./.github/actions/install-terminals
      - name: Run e2e tests
        # needs_tailscale is excluded here exactly like needs_ssh: it runs only
        # in the dedicated `tailnet` job, which joins a live Tailscale node.
        run: pytest tests/e2e/ -v -m "e2e and not needs_ssh and not needs_tailscale"
      - name: Setup SSH server
        id: ssh_setup
        uses: ./.github/actions/setup-ssh-server
        continue-on-error: true
      - name: Run e2e tests (SSH)
        if: steps.ssh_setup.outcome == 'success'
        run: pytest tests/e2e/ -v -m "e2e and needs_ssh"
      - name: Warn on skipped SSH e2e tests
        if: steps.ssh_setup.outcome != 'success'
        run: echo "::warning title=SSH e2e skipped::setup-ssh-server failed; needs_ssh tests did not run"

  packaged-install:
    name: "Packaged Install (${{ matrix.os }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # pytest orchestrates the tier (build wheel -> pristine venv -> real entry
      # point); `build` is the wheel builder, installed separately as CI's old
      # smoke job did. No virtual displays here by design: the window-spawn test
      # skips on hosted runners; the wheel build, import sweep, virgin first-run
      # and socket-real serve tests run everywhere -- already more than the old
      # ubuntu-only --help/--version smoke.
      - run: pip install -e ".[dev]"
      - run: pip install build
      - run: pytest tests/dist/ -v -m dist

  browser-upload:
    name: "Browser Upload (ubuntu-latest)"
    # NOT a required check by design (same posture as monitor-lab): provisions a
    # real headless Chromium via Playwright and drives the mobile upload page
    # end-to-end against a real `multideck serve` on loopback. The tier skips
    # cleanly on a dev box (no MDTEST_BROWSER / no Playwright); here we install
    # the browser extra + chromium and stand up a real tmux session as the psmux
    # shim so session discovery, validation, and injection all hit a live
    # multiplexer. Every other CI job stays byte-identical.
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,browser]"
      # Downloads the chromium build + its OS libraries (needs apt, hence --with-deps).
      - run: python -m playwright install --with-deps chromium
      # tmux is symlinked in as `psmux` by the test to back a real session.
      - name: Ensure tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Run browser-upload tier
        env:
          MDTEST_BROWSER: "1"
        run: pytest tests/e2e/test_upload_browser.py -m browser -v

  monitor-lab:
    name: "Monitor Lab (windows-latest)"
    # NOT a required check by design: installs the parsec-vdd virtual-display
    # driver on a throwaway hosted runner to fabricate a mixed-DPI multi-monitor
    # topology, then drives multideck's real launch+tile pipeline over it. The
    # runner is discarded at job end; the driver is never installed on a dev box
    # (the tier skips cleanly without MDTEST_MONITOR_LAB=1). Generous timeout:
    # driver install (~15s) + per-topology display settle add up.
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # wt is needed for the REAL --go window-spawn legs; the fixture installs
      # the parsec-vdd driver itself (pinned URL + sha256, silent /S).
      - name: Install terminal emulators
        uses: ./.github/actions/install-terminals
      # Both live tiers share one driver install + one session-scoped `lab`
      # fixture (tests/platform/conftest.py): the hand-authored zoo and the
      # doctor-report replay. One pytest invocation keeps them in the same
      # session so the parsec-vdd driver installs exactly once.
      - name: Run monitor-lab tier
        env:
          MDTEST_MONITOR_LAB: "1"
        run: >-
          pytest
          tests/platform/test_monitor_lab_tiling.py
          tests/platform/test_doctor_replay.py
          -m monitor_lab -q

  tailnet:
    name: "Tailnet (ubuntu-latest)"
    # NOT a required check by design (same posture as monitor-lab / browser-upload):
    # joins a REAL, ephemeral, tag-scoped Tailscale node and exercises tailnet.py's
    # live `tailscale` probes plus `multideck serve`'s Tailscale-facing default bind.
    # The node evaporates when the job ends; the tier skips cleanly on a dev box
    # (no MDTEST_TAILSCALE / no tailscale binary) so nobody must ever join a tailnet
    # on their own machine to run it.
    #
    # ONE-TIME USER SETUP (the job is inert until these exist, and stays GREEN
    # meanwhile -- it detects the missing secrets and skips loudly, never fails a
    # fork or a PR):
    #   1. Tailscale admin console -> Settings -> OAuth clients -> Generate a client
    #      with the `auth_keys` write scope, attached to the tag `tag:ci`.
    #   2. Add an ACL tag definition so the tag can exist, e.g. in the tailnet
    #      policy file:  "tagOwners": { "tag:ci": ["autogroup:admin"] }
    #   3. Add two GitHub Actions repo secrets:
    #        TS_OAUTH_CLIENT_ID  = the OAuth client id
    #        TS_OAUTH_SECRET     = the OAuth client secret
    #   Once those three are in place the job goes fully live with NO code change.
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Secrets can't be read in a job-level `if:`; surface their presence as a
      # step output so every Tailscale-dependent step gates on it. Absent (forks,
      # or before the one-time setup above) -> loud ::warning, job stays green.
      - name: Check for Tailscale OAuth secrets
        id: ts_secrets
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        run: |
          if [ -z "$TS_OAUTH_CLIENT_ID" ]; then
            echo "::warning title=Tailnet tier skipped::TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET are not set; the real-tailnet tests did not run. See the job comment for the one-time OAuth + ACL tag + secrets setup. Not a green pass of that coverage."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      # Ephemeral tagged node: OAuth + a `tag:ci` tag makes the node ephemeral
      # automatically (it deregisters when the runner disconnects at job end).
      - name: Connect to Tailscale
        if: steps.ts_secrets.outputs.present == 'true'
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888  # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Run tailnet tier (real Tailscale node)
        if: steps.ts_secrets.outputs.present == 'true'
        env:
          MDTEST_TAILSCALE: "1"
        run: pytest tests/e2e/test_tailnet_real.py -v -m "e2e and needs_tailscale"
