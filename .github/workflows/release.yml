name: Release

# Dormant by design. Nothing is published until a maintainer pushes a `v*` tag
# AND the one-time PyPI Trusted Publisher + `pypi` GitHub environment are in
# place (see RELEASING.md). `workflow_dispatch` is a SAFE dry run — it builds
# and smoke-tests the artifacts but can never publish or cut a release, so the
# pipeline can be exercised end to end without cutting a version.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build + smoke-test only, never publish or release. workflow_dispatch is always a dry run regardless (publishing is tag-push only)."
        type: boolean
        default: true

# Least privilege at the top; only the publish and release jobs elevate, each
# narrowly and only on a real tag push.
permissions:
  contents: read

concurrency:
  # Serialize per ref but NEVER cancel an in-flight run — a half-finished
  # publish must not be interrupted. Distinct tags have distinct refs, so real
  # releases never queue behind one another.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: "Build (sdist + wheel)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
      # `build` + `twine` are ad-hoc release tooling, deliberately NOT pyproject
      # extras (same stance as tests/dist and dependency-audit, which install
      # their tooling per-job).
      - run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate distribution metadata
        run: twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  smoke:
    name: "Wheel smoke (${{ matrix.os }})"
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      # Mirror the spirit of tests/dist (pristine no-extras venv, real installed
      # console script) without re-running that pytest tier. `shell: bash` is
      # present on all three hosted runners, so one step covers every OS.
      - name: Install wheel into a clean venv and run the entry point
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .smoke-venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN=.smoke-venv/Scripts
            EXE=.exe
          else
            BIN=.smoke-venv/bin
            EXE=
          fi
          "$BIN/python" -m pip install --upgrade pip
          wheel=$(ls dist/*.whl)
          echo "Installing $wheel into a pristine venv"
          "$BIN/python" -m pip install "$wheel"
          "$BIN/magent$EXE" --version
          "$BIN/magent$EXE" --help

  sdist-smoke:
    name: "Sdist smoke (ubuntu-latest)"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      # The wheel smoke above proves the built wheel installs; this proves the
      # SDIST installs too. A source tarball missing files (bad sdist include /
      # hatch build config) is a classic first-release break the wheel path
      # hides. ubuntu-only keeps CI minutes down — sdist packaging is OS-agnostic.
      - name: Install sdist into a clean venv and run the entry point
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .sdist-venv
          BIN=.sdist-venv/bin
          "$BIN/python" -m pip install --upgrade pip
          sdist=$(ls dist/*.tar.gz)
          echo "Installing $sdist into a pristine venv"
          "$BIN/python" -m pip install "$sdist"
          "$BIN/magent" --version
          "$BIN/magent" --help

  publish:
    name: "Publish to PyPI (Trusted Publishing)"
    needs: [build, smoke, sdist-smoke]
    # Tag-push ONLY. workflow_dispatch (the dry-run path) is structurally
    # excluded here, so a dispatch can never publish — regardless of the
    # dry_run input. `!inputs.dry_run` is a defensive second gate.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      # Add required reviewers to this environment in GitHub settings to hold
      # every publish for manual approval (see RELEASING.md).
      name: pypi
      url: https://pypi.org/p/magent-multi-ai-agents-manager
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing — no API token or secret in the repo
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true

  github-release:
    name: "GitHub Release"
    needs: [build, publish]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # create the GitHub Release and attach the built artifacts
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/*
          --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}"
          --generate-notes
          --verify-tag
