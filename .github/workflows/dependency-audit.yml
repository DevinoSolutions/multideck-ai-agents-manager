name: Dependency Audit

# Separate from ci.yml on purpose: advisory-database state is external and
# changes without commits, so this runs on dependency changes AND on a weekly
# schedule — a new CVE should surface loudly on its own, not wait for a push.
on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    - cron: "17 6 * * 1" # weekly sweep for advisories published since the last dep change
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dep-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: "Dependency Audit (pip-audit)"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v5.4.2
        with:
          enable-cache: true
      # Export the full locked closure (all extras, no local project) and
      # audit exactly those pins — --no-deps skips pip resolution entirely.
      - run: uv export --all-extras --no-hashes --no-emit-project -o requirements-audit.txt
      - run: uvx pip-audit==2.10.1 -r requirements-audit.txt --no-deps
