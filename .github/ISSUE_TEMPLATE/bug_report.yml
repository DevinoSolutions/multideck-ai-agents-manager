name: Bug report
description: Report a problem with multideck
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections
        below so we can reproduce and fix it quickly.
  - type: input
    id: version
    attributes:
      label: multideck version
      description: Output of `multideck --version`.
      placeholder: "multideck, version 1.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system & version
      placeholder: "Windows 11 23H2 / macOS 14.5 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      description: Which terminal emulator you launched multideck from.
      placeholder: "Windows Terminal / kitty / iTerm2 / gnome-terminal"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you saw and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands and config that trigger the problem.
      placeholder: |
        1. Run `multideck ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: multideck doctor output
      description: Paste the output of `multideck doctor`. Rendered as code — no backticks needed.
      render: text
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: |
        Logs live at `~/.multideck/logs/<name>.log` (e.g. `launch.log`,
        `upload.log`, `attention.log`, `hotkey.log`, `platform.log`). Paste any
        relevant lines.
      render: text
    validations:
      required: false
